vmType: vz

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 2
memory: "2GiB"
disk: "20GiB"

mounts:
  - location: "~"

ssh:
  loadDotSSHPubKeys: true

networks:
  - lima: shared
    macAddress: "52:55:55:a5:52:a1"

provision:
  - mode: system
    script: |
      cat >/etc/netplan/60-lima-static.yaml <<'EOF'
      network:
        version: 2
        renderer: networkd
        ethernets:
          lima0:
            match:
              macaddress: "52:55:55:a5:52:a1"
            set-name: lima0
            dhcp4: false
            addresses:
              - 192.168.105.12/24
            routes:
              - to: default
                via: 192.168.105.1
                metric: 100
            nameservers:
              addresses:
                - 192.168.105.1
      EOF
      netplan generate
      netplan apply
